name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Check packaging succeeds
        run: npx vsce package --no-git-tag-version --out c2st.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: c2st-vsix
          path: c2st.vsix
          retention-days: 14
